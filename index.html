<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나무 열매 도감</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --accent: #10b981;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --modal-bg: rgba(10, 15, 25, 0.98);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.2rem 5%;
            position: sticky;
            top: 0; z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .controls { display: flex; gap: 1rem; align-items: center; }

        .search-container { width: 300px; position: relative; }
        .search-container input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .search-container input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); opacity: 0.9; }

        .container {
            max-width: 1600px;
            margin: 3rem auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass-border);
            position: relative;
        }
        .card:hover { transform: translateY(-15px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card-img-wrapper { width: 100%; aspect-ratio: 1/1.2; overflow: hidden; background: #000; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
        .card:hover .card-img { transform: scale(1.05); }
        .card-content { padding: 1.5rem; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
        .card-category { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--modal-bg);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; opacity: 1; }
        .modal-content {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: #111827;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .modal-close {
            position: fixed;
            top: 1.5rem; right: 1.5rem;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 5000;
            font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .modal-image-section { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .modal-main-img { max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-badge {
            position: absolute;
            top: 2rem; left: 2rem;
            background: var(--accent);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .modal-info-section { flex: 0.8; padding: 4rem 3rem; overflow-y: auto; display: flex; flex-direction: column; gap: 2rem; }
        
        .modal-title { font-size: 2.5rem; font-weight: 800; line-height: 1.2; }
        .modal-category { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
        .modal-desc { color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; }

        .zoom-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: none;
            z-index: 100;
            cursor: zoom-out;
            overflow: hidden;
            touch-action: none;
        }
        .zoom-overlay.active { display: block; }
        .zoomed-image { 
            position: absolute;
            width: 100%; 
            height: 100%;
            object-fit: contain;
            transform-origin: center;
            transition: transform 0.1s;
        }

        @media (max-width: 1000px) {
            .modal-content { height: 95vh; }
            .modal-image-section { height: 100%; }
        }
    </style>
</head>

        // Modal and Zoom Logic
        const grid = document.getElementById('grid');
        const modal = document.getElementById('modal');
        const searchInput = document.getElementById('search');
        const imgWrapper = document.getElementById('img-wrapper');
        const zoomOverlay = document.getElementById('zoom-overlay');
        const zoomedImg = document.getElementById('zoomed-img');
        const closeBtn = document.getElementById('close-modal');
        const modalBadge = document.getElementById('modal-badge');
        const modalContent = document.querySelector('.modal-content');

        let zoomStage = 0; // 0: Normal, 1: Fullscreen (No UI), 2: Max Zoom
        let currentScale = 1;
        let startDist = 0;
        let translateX = 0;
        let translateY = 0;
        let isPanning = false;
        let startX = 0;
        let startY = 0;
        let dragMoved = false;
        let evCache = [];

        function renderGrid(data) {
            grid.innerHTML = data.map(item => `
                <div class="card" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&apos;")})'>
                    <div class="card-img-wrapper">
                        <img src="${item.images[0]}" class="card-img" loading="lazy">
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.name}</div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(item) {
            document.getElementById('modal-img').src = item.images[0];
            zoomedImg.src = item.images[0];
            modalBadge.textContent = item.category;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            zoomStage = 0;
            currentScale = 1;
            updateZoomStage();
        }

        function updateZoomStage() {
            if (zoomStage === 0) {
                closeBtn.style.opacity = '1';
                closeBtn.style.pointerEvents = 'auto';
                modalBadge.style.opacity = '0'; // Hidden on initial view (zoomStage 0)
                zoomOverlay.classList.remove('active');
                modalContent.style.width = '90%';
                modalContent.style.height = '90vh';
                modalContent.style.maxWidth = '1200px';
                modalContent.style.borderRadius = '30px';
            } else if (zoomStage === 1) {
                closeBtn.style.opacity = '0';
                closeBtn.style.pointerEvents = 'none';
                modalBadge.style.opacity = '0';
                zoomOverlay.classList.remove('active');
                modalContent.style.width = '100%';
                modalContent.style.height = '100vh';
                modalContent.style.maxWidth = 'none';
                modalContent.style.borderRadius = '0';
            } else if (zoomStage === 2) {
                zoomOverlay.classList.add('active');
                currentScale = 2.5;
                translateX = 0;
                translateY = 0;
                zoomedImg.style.transform = `translate(0, 0) scale(${currentScale})`;
            }
        }

        imgWrapper.onclick = (e) => {
            if (zoomStage === 2) return; // Handled by zoomOverlay
            e.stopPropagation();
            zoomStage = (zoomStage + 1) % 3;
            updateZoomStage();
        };

        zoomOverlay.onclick = (e) => {
            e.stopPropagation();
            if (!dragMoved) {
                zoomStage = 0;
                updateZoomStage();
            }
        };

        closeBtn.onclick = (e) => {
            e.stopPropagation();
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        zoomOverlay.onpointerdown = (e) => {
            if (zoomStage !== 2) return;
            evCache.push(e);
            if (evCache.length === 1) {
                isPanning = true;
                dragMoved = false;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
            }
            zoomOverlay.setPointerCapture(e.pointerId);
        };

        zoomOverlay.onpointermove = (e) => {
            if (zoomStage !== 2) return;
            const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
            if (index > -1) evCache[index] = e;

            if (evCache.length === 2) {
                isPanning = false;
                const curDist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
                if (startDist > 0) {
                    const scaleFactor = curDist / startDist;
                    currentScale = Math.min(Math.max(currentScale * scaleFactor, 1), 5);
                    dragMoved = true;
                }
                startDist = curDist;
            } else if (evCache.length === 1 && isPanning) {
                const dx = e.clientX - (startX + translateX);
                const dy = e.clientY - (startY + translateY);
                if (Math.hypot(dx, dy) > 5) dragMoved = true;
                
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
            }
            
            zoomedImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        };

        zoomOverlay.onpointerup = zoomOverlay.onpointerout = zoomOverlay.onpointercancel = (e) => {
            evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
            if (evCache.length < 2) startDist = 0;
            if (evCache.length === 0) isPanning = false;
            zoomOverlay.releasePointerCapture(e.pointerId);
        };

        searchInput.oninput = (e) => {
            const term = e.target.value.trim().toLowerCase();
            const filtered = speciesData.filter(t => t.name.toLowerCase().includes(term));
            renderGrid(filtered);
        };

        document.getElementById('flower-btn').onclick = () => {
            const term = '나무 열매 도감';
            const filtered = speciesData.filter(t => t.category.includes(term));
            renderGrid(filtered);
        };

        // Initialize
        renderGrid(speciesData);
    </script>
